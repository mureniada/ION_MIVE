# ION MIVE Lab — Docker Compose.
# backend: FastAPI transport (M8). ui: Streamlit thin client (M9). qdrant: vector store.
# Persistent HF/sentence-transformers cache (M8.1) avoids re-downloading the model.
# Qdrant is the only vector store (ADR-005).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - qdrant
    volumes:
      # Corpus mounted read-only at the documented container path /app/corpus/source.
      # Ingestion (overrides the default command):
      #   docker compose run --rm backend python -m app.ingest_cli --source corpus/source --recreate
      - ./corpus/source:/app/corpus/source:ro
      # Persistent embedding-model cache (M8.1): reused across container runs.
      - hf_cache:/root/.cache/huggingface
    environment:
      DEBUG: "${DEBUG:-false}"
      VECTOR_STORE_URL: "http://qdrant:6333"
      VECTOR_COLLECTION: "${VECTOR_COLLECTION:-ion_corpus_v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-}"
      EMBEDDING_BACKEND: "${EMBEDDING_BACKEND:-local}"
      # Persistent embedding cache locations (M8.1).
      HF_HOME: "/root/.cache/huggingface"
      TRANSFORMERS_CACHE: "/root/.cache/huggingface/transformers"
      SENTENCE_TRANSFORMERS_HOME: "/root/.cache/huggingface/sentence-transformers"
      # Secrets are provided at runtime via the environment / .env, never baked in.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  ui:
    build:
      context: ./ui
    depends_on:
      - backend
    environment:
      # Streamlit reaches the backend over the internal compose network only.
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"

volumes:
  qdrant_storage:
  hf_cache:
